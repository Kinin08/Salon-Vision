<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Crie sua conta no Salon Vision e comece a gerenciar seu salão de beleza gratuitamente.">
  <meta name="theme-color" content="#d4a5a5">
  <title>Criar Conta - Salon Vision</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="/views/assets/_common/css/variables.css">
  <link rel="stylesheet" href="/views/assets/_common/css/reset.css">
  <link rel="stylesheet" href="/views/assets/_common/css/utilities.css">
  <link rel="stylesheet" href="/views/assets/_common/css/components.css">
  <link rel="stylesheet" href="/views/assets/public/css/styles.css">
</head>
<body>
  <main class="auth-page">
    <article class="auth-card">
      <header class="auth-card__header">
        <a href="/views/public/index.html" class="auth-card__logo">
          <span class="auth-card__logo-icon" aria-hidden="true">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/>
              <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/>
            </svg>
          </span>
          Salon Vision
        </a>
        <h1 class="auth-card__title">Crie sua conta</h1>
        <p class="auth-card__subtitle">Comece gratuitamente e transforme a gestão do seu salão</p>
      </header>

      <form id="register-form" class="auth-form" novalidate>
        <section class="auth-form__row">
          <fieldset class="form-group">
            <label for="first_name" class="form-label form-label--required">Nome</label>
            <input 
              type="text" 
              id="first_name" 
              name="first_name" 
              class="form-input" 
              placeholder="Seu nome"
              autocomplete="given-name"
              required
            >
          </fieldset>

          <fieldset class="form-group">
            <label for="last_name" class="form-label form-label--required">Sobrenome</label>
            <input 
              type="text" 
              id="last_name" 
              name="last_name" 
              class="form-input" 
              placeholder="Seu sobrenome"
              autocomplete="family-name"
              required
            >
          </fieldset>
        </section>

        <fieldset class="form-group">
          <label for="salon_name" class="form-label form-label--required">Nome do Salão</label>
          <input 
            type="text" 
            id="salon_name" 
            name="salon_name" 
            class="form-input" 
            placeholder="Nome do seu salão"
            required
          >
        </fieldset>

        <fieldset class="form-group">
          <label for="email" class="form-label form-label--required">E-mail</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            class="form-input" 
            placeholder="seu@email.com"
            autocomplete="email"
            required
          >
        </fieldset>

        <fieldset class="form-group">
          <label for="phone" class="form-label form-label--required">Telefone</label>
          <input 
            type="tel" 
            id="phone" 
            name="phone" 
            class="form-input" 
            placeholder="(11) 99999-9999"
            autocomplete="tel"
            required
          >
        </fieldset>

        <fieldset class="form-group">
          <label for="password" class="form-label form-label--required">Senha</label>
          <section class="relative">
            <input 
              type="password" 
              id="password" 
              name="password" 
              class="form-input" 
              placeholder="Mínimo 8 caracteres"
              autocomplete="new-password"
              minlength="8"
              required
            >
            <button 
              type="button" 
              class="password-toggle absolute right-0 top-0 h-full px-4 text-muted"
              aria-label="Mostrar senha"
            >
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </section>
        </fieldset>

        <fieldset class="form-group">
          <label for="password_confirm" class="form-label form-label--required">Confirmar Senha</label>
          <input 
            type="password" 
            id="password_confirm" 
            name="password_confirm" 
            class="form-input" 
            placeholder="Confirme sua senha"
            autocomplete="new-password"
            required
          >
        </fieldset>

        <label class="form-checkbox">
          <input type="checkbox" id="terms" name="terms" required>
          <span>Li e aceito os <a href="#" class="text-accent">Termos de Uso</a> e a <a href="#" class="text-accent">Política de Privacidade</a></span>
        </label>

        <button type="submit" class="btn btn--primary btn--lg w-full">
          Criar Conta Grátis
        </button>

        <p class="auth-form__divider">ou cadastre-se com</p>

        <section class="auth-form__social">
          <button type="button" class="auth-form__social-btn">
            <svg width="20" height="20" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google
          </button>
          <button type="button" class="auth-form__social-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
              <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
            Facebook
          </button>
        </section>
      </form>

      <footer class="auth-card__footer">
        <p>Já tem uma conta? <a href="/views/public/login.html">Entre aqui</a></p>
      </footer>
    </article>
  </main>

  <!-- Scripts -->
  <script src="/views/assets/_common/js/utils.js"></script>
  <script src="/views/assets/_common/js/HttpClientBase.js"></script>
  <script src="/views/assets/public/js/main.js"></script>
</body>
</html>
